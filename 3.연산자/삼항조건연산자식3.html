<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //주제 : 세개의 숫자 중 가장 큰 수를 삼항조건연산자식으로 구하는 예

        //세개의 숫자를 각자 상수메모리를 만들어 저장
        const num1 = 30;   const num2 = 20;  const num3 = 15;

        //삼항조건연산자식 을 사용하여 가장 큰수 찾기
        // const max = 조건식   ?   조건식이 참일때 실행될 코드       :  조건식이 거짓일때 실행될 코드;
     const max = (num1 > num2) ?  (num1 > num3 ?  num1 : num3)   :  (num2 > num3 ? num2 : num3 );    
            //      30 >  20   ?  (  30 >  15  ?    30 :  15 )   :  ( 20  >  15  ?  20  :  15  );
            //        true                true 이므로 30출력
    console.log(max);




    </script>
    
</body>
</html>
