<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //--------아래의 블록문 {       }을 기준으로 전역 스코프 영역
        let a = 10; //전역변수 a선언 후 10 저장

        //블록문    {           }
        {
            //---------지역 스코프영역에 지역변수 b선언 후 20 저장
            let b = 20;

            console.log(`블록문 내부(지역 스코프)에서 a변수값 얻어 출력 : ${a}`);
            console.log(`블록문 내부(지역 스코프)에서 b변수값 얻어 출력 : ${b}`);

        }
        console.log(`블록문 외부(전역 스코프)에서 a변수값 얻어 출력 : ${a}`);
        console.log(`블록문 외부(전역 스코프)에서 b변수값 얻어 출력 : ${b}`);

      


    </script>
    
</body>
</html>
