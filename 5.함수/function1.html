        "함수를 정의 하는 방법(만드는 방법)"

            방법1. 함수 선언문 function키워드로 함수 정의 및 매개변수 처리

                   function 함수명(매개변수1, 매개변수2){

            방법2. 함수 표현식 const 상수명 = function키워드로 함수 정의 및 매개변수 처리

                    const 상수명 = function(매개변수1, 매개변수2)){

                    };

                    상수명(인수1, 인수2);   <--- 함수 호출 구문

                    const 상수명 = (매개변수1, 매개변수2) => {

    /*    
    "함수를 정의 하는 방법(만드는 방법)"

        방법1. 함수 선언문 function키워드로 함수 정의 및 매개변수 처리
    */    
            //함수 기능 : 매개변수 로 전달 받은 2개의 숫자 값을 곱해서 반환하는 기능
            function multiply(a, b){

                    console.log('a: $(a), b: $(b)');

                    return a * b ;


            }
            //----------------------------------------------------------
            /*
                multiply(5, 10); <- 호출시 a매개변수에는 5를 전달하고, b매개변수에는 10을 전달 합니다.
                                    console.log('a: $(a), b: $(b)'); 출력 구문이 실행되면
                                                 a: 5,    b: 10     출력됩니다.
                                                 return a * b; 구문이 실행되면
                                                 return 5 * 10; 계산되어
                                                 return 50; 만들어서 multiply(5,10); 호출 구문으로 50 반환

            */
            console.log(multiply(5, 10));
            /* 
                multiply(7); <- 호출시 a매개변수에만 7을 전달하고, b매개변수에는 값(인수)을 전달하지 않았을때
                                a매개변수에는 7이 전달되고, b매개변수에는 전달된 값이 없으므로 undefined가 할당되어
                                console.log('a: $(a), b: $(b)'); 구문에서 실행결과를 보면 
                                             a: 7, b: undefined 출력되고
                                return 7 * undefinde; 가 되므로
                                return NaN; 이 계산되어 NaN 을 반환 합니다.              
            */
            console.log(multiply(7));   //NaN



           /* multiply(7)



            /*
                multiply();  <- 호출시 a와 b매개변수는 모두 undefined가 되어 
                                console.log('a: $(a), b: $(b)'); 출력 결과는???
                                             a: undefined,  b: undefined 입니다
                                그리고 return a * b; 는
                                      return undefined * undefined; 이므로 NaN 이 반환 됩니다.              

            */
            console.log(multiply());   //NaN
            //-------------------------------------------------------------------------------------
            // "함수를 정의 하는 방법(만드는 방법)" 중에서
             //    방법3. 화살표 함수로 함수 정의 및 매개변수 기본값 할당 처리..........


            const add = (x=5, y=5) => {
                    
                    console.log('x: $(x), y: $(y)'); //<----실행할 코드 : 확인용
                    return x + y; // <-------두 매개변수 합 결과 반환                   
            };
            //결론 : 매개변수 x나 y에 함수 호출시 인수를 전달하지 않으면
            //       undefined가 할당되는데 ES6버전의 기본값 할당기능을 사용하면 이를 방지 할수 있다.
            
            // add(); 호출할때 x매개변수, y매개변수에 전달하는 인수가 없으므로
            // 화살표 함수 정의시 매개변수x의 기본값 5, 매개변수y의 기본값 5를 그대로 사용
            // console.log('x: $(x), y: $(y)');
            //              x:   5 , y:   5    <-출력
            // return x + y; // <-------두 매개변수 합 결과 반환
            // return 5 + 5;
            // return   10;   <- add(); 작성해서 호출한 코드 줄의 자리로 10을 반환받아와서 console.log로 출력
            console.log(add());  // return 5+ 5; 의해 10을 반환받아 출력

            //-------------------------------------------------------------------------------------
            // x매개변수자리에 5대신 3이 전달되어 저장될것이고,
            // y매개변수자리에는 초깃값 5가 저장되어 있어서 그대로 사용될것이다.

    </script>
