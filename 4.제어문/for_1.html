<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
            /*

                for 반복문 작성 문법
                            
                        for(초기식;         조건식;         증감식){
                        
                                        조건식의 결과값이 true(참)일 경우에만 반복할 실행코드;
                        
                        
                        }
            */

        // "반복" 글자를 10번 반복해서 출력
        // 풀이 : 1변수값 1에서 10이 될때 까지 계속 "반복" 글자를 10번 반복해서 출력

        for(let i=1;        i<=10;          i++){

                        document.write("반복<br>");



        }





    </script>
    
</body>
</html>
